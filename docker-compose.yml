services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: genevidence
      POSTGRES_USER: genevidence
      POSTGRES_PASSWORD: genevidence
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U genevidence -d genevidence"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://genevidence:genevidence@db:5432/genevidence
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: change-me-in-production
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      MAX_UPLOAD_MB: 25
      STORAGE_DIR: /app/storage
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS}
      SEMANTIC_ENABLED: "false"
      SEMANTIC_MODEL_NAME: intfloat/multilingual-e5-base
      SEMANTIC_EMBEDDING_DIMENSIONS: 768
    volumes:
      - backend_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      APP_NAME: ${APP_NAME}
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  backend_storage:
